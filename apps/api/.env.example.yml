# ============== App ===============
PORT: 6700
APP_ENV: local
APP_URL: https://api.lemurjs.local

LEMUR_APP_URL: https://app.lemurjs.local

# ============== Auth ===============

JWT_SECRET: change-me

# ============== Postgres ===============

POSTGRES_HOST: localhost
POSTGRES_PORT: 6720
POSTGRES_USER: root
POSTGRES_PASS: root
POSTGRES_DB: app

# ============== Mailer ===============

EMAIL_DEFAULT_FROM_NAME: LemurJS
EMAIL_DEFAULT_FROM_ADDRESS: noreply@lemur.test

# ============== Service Accounts ===============

APP_SERVICE_ACCOUNT_ID: svc:app
SERVICE_ACCOUNT_EMAIL_DOMAIN: serviceaccount.lemur.test

# ============== S3 (MinIO via infra/local/up.sh) ===============

AWS_S3_PROVIDER: minio
AWS_S3_ENDPOINT: http://localhost:9000
AWS_S3_REGION: us-east-1
AWS_S3_FORCE_PATH_STYLE: true
AWS_S3_BUCKET: lemurjs-uploads
AWS_S3_PRIVATE_BUCKET: lemurjs-private
AWS_S3_ACCESS_KEY_ID: minioadmin
AWS_S3_SECRET_ACCESS_KEY: minioadmin
