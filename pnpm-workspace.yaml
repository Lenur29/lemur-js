packages:
  - 'apps/*'
  - 'libs/*'
  - 'e2e'

catalog:
  # ============================================
  # Build Tools
  # ============================================
  typescript: "5.9.3"
  eslint: "9.39.2"
  "@deepvision/eslint-plugin": "2.0.0-rc.10"
  "@types/node": "24.10.7"

  # ============================================
  # Apollo / GraphQL
  # ============================================
  "@apollo/client": "4.1.9"
  graphql: "16.12.0"
  graphql-tag: "2.12.6"
  graphql-ws: "6.0.6"

  # ============================================
  # Validation
  # ============================================
  valibot: "1.2.0"

  # ============================================
  # Date & Internationalization
  # ============================================
  date-fns: "4.1.0"

  # ============================================
  # @pcg Internal Packages
  # ============================================
  "@pcg/text-kit": "1.0.0"
  "@pcg/auth": "1.0.0"
  "@pcg/dynamic-components": "1.0.0"
  "@pcg/graphql-kit": "2.0.0"
  "@pcg/dotenv-yaml": "1.0.0"
  "@pcg/predicates": "1.0.0"
  "@pcg/typeorm": "1.0.0"
  "@pcg/cli-tools": "1.1.0"

  # ============================================
  # Backend Shared
  # ============================================
  bcrypt: "6.0.0"
  pg: "8.16.3"
  "@types/pg": "^8.16.0"
  mailpit-api: "1.6.0"
  winston: "3.19.0"
  rxjs: "7.8.2"
  "@types/bcrypt": "6.0.0"
  "@faker-js/faker": "10.2.0"

onlyBuiltDependencies:
  - esbuild
  - bcrypt
